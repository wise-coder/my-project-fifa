<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FIFA Stats</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1992368412422175"
     crossorigin="anonymous"></script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-bg: #121212;
            --secondary-bg: #1E1E1E;
            --tertiary-bg: #2D2D2D;
            --primary-text: #FFFFFF;
            --secondary-text: #B0B0B0;
            --accent-color: #00FF88;
            --accent-hover: #00CC6A;
            --danger-color: #FF4757;
            --border-color: #3D3D3D;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--primary-bg);
            color: var(--primary-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 70%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                linear-gradient(135deg, #121212 0%, #1a1a2e 100%);
            z-index: -1;
        }

        .login-card {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--accent-color), #00AA55);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .login-header .logo-icon i {
            font-size: 35px;
            color: var(--primary-bg);
        }

        .login-header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--secondary-text);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: var(--primary-text);
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            background: var(--tertiary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 16px;
            color: var(--primary-text);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: var(--tertiary-bg);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
            color: var(--primary-text);
            outline: none;
        }

        .form-control::placeholder {
            color: var(--secondary-text);
            opacity: 0.7;
        }

        .input-group-text {
            background: var(--tertiary-bg);
            border: 1px solid var(--border-color);
            border-left: none;
            color: var(--secondary-text);
        }

        .input-group .form-control {
            border-right: none;
        }

        .form-control.is-invalid {
            border-color: var(--danger-color);
            background-image: none;
        }

        .invalid-feedback {
            color: var(--danger-color);
            font-size: 0.85rem;
            margin-top: 6px;
            display: none;
        }

        .form-control.is-invalid~.invalid-feedback {
            display: block;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-check-input {
            background-color: var(--tertiary-bg);
            border-color: var(--border-color);
            width: 18px;
            height: 18px;
            margin: 0;
        }

        .form-check-input:checked {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .form-check-label {
            color: var(--secondary-text);
            font-size: 0.9rem;
        }

        .forgot-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: var(--accent-color);
            color: var(--primary-bg);
            border: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            padding: 0 15px;
            color: var(--secondary-text);
            font-size: 0.9rem;
        }

        .social-login {
            display: flex;
            gap: 15px;
        }

        .btn-social {
            flex: 1;
            padding: 12px;
            background: var(--tertiary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--primary-text);
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-social:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
        }

        .register-link p {
            color: var(--secondary-text);
            font-size: 0.95rem;
        }

        .register-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .back-link a {
            color: var(--secondary-text);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-custom {
            background: var(--tertiary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-custom.success {
            border-color: var(--accent-color);
            background: rgba(0, 255, 136, 0.1);
        }

        .alert-custom.error {
            border-color: var(--danger-color);
            background: rgba(255, 71, 87, 0.1);
        }

        .alert-custom i {
            margin-right: 8px;
        }

        .spinner-container {
            display: none;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
        }

        .spinner-container.active {
            display: flex;
        }

        .spinner-border {
            color: var(--accent-color);
        }

        @media (max-width: 576px) {
            .login-card {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-pattern"></div>
    <div class="back-link">
        <a href="landing.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon"><i class="fas fa-trophy"></i></div>
            <h1>Welcome Back</h1>
            <p>Login to access your FIFA stats</p>
        </div>
        <div id="alertContainer"></div>
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label class="form-label" for="email"><i class="fas fa-envelope me-2"></i>Email Address</label>
                <div class="input-group">
                    <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email"
                        required>
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                </div>
                <div class="invalid-feedback">Please enter a valid email address</div>
            </div>
            <div class="form-group">
                <label class="form-label" for="password"><i class="fas fa-lock me-2"></i>Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password"
                        placeholder="Enter your password" required>
                    <span class="input-group-text"><i class="fas fa-eye toggle-password"
                            style="cursor: pointer;"></i></span>
                </div>
                <div class="invalid-feedback">Password is required</div>
            </div>
            <div class="form-options">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <div class="forgot-link"><a href="#">Forgot password?</a></div>
            </div>
            <button type="submit" class="btn btn-login" id="submitBtn"><i
                    class="fas fa-sign-in-alt me-2"></i>Login</button>
            <div class="spinner-container" id="spinnerContainer">
                <div class="spinner-border" role="status"><span class="visually-hidden">Loading...</span></div>
            </div>
        </form>
        <div class="divider"><span>OR</span></div>
        <div class="social-login">
            <button type="button" class="btn-social google"><i class="fab fa-google"></i></button>
            <button type="button" class="btn-social facebook"><i class="fab fa-facebook-f"></i></button>
        </div>
        <div class="register-link">
            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script>
        const API_BASE_URL = window.APP_CONFIG?.API_BASE_URL || 'https://fifa-fighters.onrender.com/api';

        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('submitBtn');
            const spinnerContainer = document.getElementById('spinnerContainer');
            const alertContainer = document.getElementById('alertContainer');

            document.querySelector('.toggle-password').addEventListener('click', function () {
                const input = this.closest('.input-group').querySelector('input');
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });

            emailInput.addEventListener('blur', function () { validateEmail(this); });
            emailInput.addEventListener('input', function () { if (this.classList.contains('is-invalid')) validateEmail(this); });
            passwordInput.addEventListener('blur', function () { validatePassword(this); });
            passwordInput.addEventListener('input', function () { if (this.classList.contains('is-invalid')) validatePassword(this); });

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                const isEmailValid = validateEmail(emailInput);
                const isPasswordValid = validatePassword(passwordInput);

                if (isEmailValid && isPasswordValid) {
                    submitBtn.disabled = true;
                    spinnerContainer.classList.add('active');

                    try {
                        const response = await fetch(API_BASE_URL + '/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'include',
                            body: JSON.stringify({ email: emailInput.value, password: passwordInput.value })
                        });
                        const data = await response.json();
                        spinnerContainer.classList.remove('active');
                        submitBtn.disabled = false;

                        if (data.success) {
                            localStorage.setItem('authToken', data.data.token || 'authenticated');
                            localStorage.setItem('user', JSON.stringify(data.data.user));
                            showAlert('Login successful! Redirecting...', 'success');

                            // Check if user is admin and redirect accordingly
                            const isAdmin = data.data.user && data.data.user.is_admin;
                            setTimeout(() => {
                                if (isAdmin) {
                                    window.location.href = 'admin_dashboard.html';
                                } else {
                                    window.location.href = 'dashboard.html';
                                }
                            }, 1500);
                        } else {
                            showAlert(data.message || 'Invalid credentials', 'error');
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        spinnerContainer.classList.remove('active');
                        submitBtn.disabled = false;
                        showAlert('Backend not available. Using demo mode.', 'error');
                        setTimeout(() => {
                            localStorage.setItem('authToken', 'demo_token_12345');
                            localStorage.setItem('user', JSON.stringify({ id: 1, username: 'FIFA_Pro', email: emailInput.value }));
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    }
                }
            });

            function validateEmail(input) {
                const value = input.value.trim();
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(value)) { input.classList.remove('is-valid'); input.classList.add('is-invalid'); return false; }
                else { input.classList.remove('is-invalid'); input.classList.add('is-valid'); return true; }
            }

            function validatePassword(input) {
                const value = input.value;
                if (value === '') { input.classList.remove('is-valid'); input.classList.add('is-invalid'); return false; }
                else { input.classList.remove('is-invalid'); input.classList.add('is-valid'); return true; }
            }

            function showAlert(message, type) {
                alertContainer.innerHTML = '<div class="alert-custom ' + type + '"><i class="fas fa-' + (type === 'success' ? 'check-circle' : 'exclamation-circle') + '"></i>' + message + '</div>';
                alertContainer.querySelector('.alert-custom').style.display = 'block';
            }

            const token = localStorage.getItem('authToken');
            if (token) { window.location.href = 'dashboard.html'; }
        });
    </script>
</body>

</html>

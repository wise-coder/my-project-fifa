<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FIFA Stats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #121212;
            --secondary-bg: #1E1E1E;
            --tertiary-bg: #2D2D2D;
            --primary-text: #FFFFFF;
            --secondary-text: #B0B0B0;
            --accent-color: #00FF88;
            --accent-hover: #00CC6A;
            --danger-color: #FF4757;
            --border-color: #3D3D3D;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--primary-bg);
            color: var(--primary-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 70%, rgba(0, 255, 136, 0.05) 0%, transparent 50%), radial-gradient(circle at 70% 30%, rgba(0, 255, 136, 0.05) 0%, transparent 50%), linear-gradient(135deg, #121212 0%, #1a1a2e 100%);
            z-index: -1;
        }

        .register-card {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--accent-color), #00AA55);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .register-header .logo-icon i {
            font-size: 35px;
            color: var(--primary-bg);
        }

        .register-header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .register-header p {
            color: var(--secondary-text);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: var(--primary-text);
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            background: var(--tertiary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 16px;
            color: var(--primary-text);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: var(--tertiary-bg);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
            color: var(--primary-text);
            outline: none;
        }

        .form-control::placeholder {
            color: var(--secondary-text);
            opacity: 0.7;
        }

        .input-group-text {
            background: var(--tertiary-bg);
            border: 1px solid var(--border-color);
            border-left: none;
            color: var(--secondary-text);
        }

        .input-group .form-control {
            border-right: none;
        }

        .form-control.is-invalid {
            border-color: var(--danger-color);
            background-image: none;
        }

        .invalid-feedback {
            color: var(--danger-color);
            font-size: 0.85rem;
            margin-top: 6px;
            display: none;
        }

        .form-control.is-invalid~.invalid-feedback {
            display: block;
        }

        .password-strength {
            height: 4px;
            background: var(--tertiary-bg);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .password-strength-bar.weak {
            width: 33%;
            background: var(--danger-color);
        }

        .password-strength-bar.medium {
            width: 66%;
            background: #FFA502;
        }

        .password-strength-bar.strong {
            width: 100%;
            background: var(--accent-color);
        }

        .btn-register {
            width: 100%;
            padding: 16px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: var(--accent-color);
            color: var(--primary-bg);
            border: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-register:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            padding: 0 15px;
            color: var(--secondary-text);
            font-size: 0.9rem;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link p {
            color: var(--secondary-text);
            font-size: 0.95rem;
        }

        .login-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .back-link a {
            color: var(--secondary-text);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-custom {
            background: var(--tertiary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-custom.success {
            border-color: var(--accent-color);
            background: rgba(0, 255, 136, 0.1);
        }

        .alert-custom.error {
            border-color: var(--danger-color);
            background: rgba(255, 71, 87, 0.1);
        }

        .alert-custom i {
            margin-right: 8px;
        }

        @media (max-width: 576px) {
            .register-card {
                padding: 30px 20px;
            }

            .register-header h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-pattern"></div>
    <div class="back-link"><a href="landing.html"><i class="fas fa-arrow-left"></i> Back to Home</a></div>
    <div class="register-card">
        <div class="register-header">
            <div class="logo-icon"><i class="fas fa-trophy"></i></div>
            <h1>Create Account</h1>
            <p>Join the FIFA Stats community today</p>
        </div>
        <div id="alertContainer"></div>
        <form id="registerForm" novalidate>
            <div class="form-group">
                <label class="form-label" for="username"><i class="fas fa-user me-2"></i>Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username"
                    required>
                <div class="invalid-feedback">Username must be at least 3 characters long</div>
            </div>
            <div class="form-group">
                <label class="form-label" for="email"><i class="fas fa-envelope me-2"></i>Email Address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email"
                    required>
                <div class="invalid-feedback">Please enter a valid email address</div>
            </div>
            <div class="form-group">
                <label class="form-label" for="password"><i class="fas fa-lock me-2"></i>Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password"
                        placeholder="Create a password" required>
                    <span class="input-group-text"><i class="fas fa-eye toggle-password"
                            style="cursor: pointer;"></i></span>
                </div>
                <div class="password-strength">
                    <div class="password-strength-bar" id="passwordStrengthBar"></div>
                </div>
                <div class="invalid-feedback">Password must be at least 6 characters long</div>
            </div>
            <div class="form-group">
                <label class="form-label" for="confirmPassword"><i class="fas fa-lock me-2"></i>Confirm Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                        placeholder="Confirm your password" required>
                    <span class="input-group-text"><i class="fas fa-eye toggle-password"
                            style="cursor: pointer;"></i></span>
                </div>
                <div class="invalid-feedback">Passwords do not match</div>
            </div>
            <button type="submit" class="btn btn-register" id="submitBtn"><i class="fas fa-user-plus me-2"></i>Create
                Account</button>
        </form>
        <div class="divider"><span>OR</span></div>
        <div class="login-link">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = 'https://fifa-fighters.onrender.com/api';

        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('registerForm');
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const passwordStrengthBar = document.getElementById('passwordStrengthBar');
            const alertContainer = document.getElementById('alertContainer');

            document.querySelectorAll('.toggle-password').forEach(toggle => {
                toggle.addEventListener('click', function () {
                    const input = this.closest('.input-group').querySelector('input');
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                });
            });

            usernameInput.addEventListener('blur', function () { validateUsername(this); });
            usernameInput.addEventListener('input', function () { if (this.classList.contains('is-invalid')) validateUsername(this); });
            emailInput.addEventListener('blur', function () { validateEmail(this); });
            emailInput.addEventListener('input', function () { if (this.classList.contains('is-invalid')) validateEmail(this); });
            passwordInput.addEventListener('input', function () { validatePassword(this); updatePasswordStrength(this.value); });
            passwordInput.addEventListener('blur', function () { validatePassword(this); });
            confirmPasswordInput.addEventListener('input', function () { validateConfirmPassword(this); });
            confirmPasswordInput.addEventListener('blur', function () { validateConfirmPassword(this); });

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                const isUsernameValid = validateUsername(usernameInput);
                const isEmailValid = validateEmail(emailInput);
                const isPasswordValid = validatePassword(passwordInput);
                const isConfirmValid = validateConfirmPassword(confirmPasswordInput);

                if (isUsernameValid && isEmailValid && isPasswordValid && isConfirmValid) {
                    document.getElementById('submitBtn').disabled = true;

                    try {
                        const response = await fetch(API_BASE_URL + '/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'include',
                            body: JSON.stringify({
                                username: usernameInput.value,
                                email: emailInput.value,
                                password: passwordInput.value
                            })
                        });
                        const data = await response.json();
                        document.getElementById('submitBtn').disabled = false;

                        if (data.success) {
                            showAlert('Account created successfully! Redirecting to login...', 'success');
                            setTimeout(() => window.location.href = 'login.html', 2000);
                        } else {
                            showAlert(data.message || 'Registration failed', 'error');
                        }
                    } catch (error) {
                        console.error('Registration error:', error);
                        document.getElementById('submitBtn').disabled = false;
                        showAlert('Backend not available. Using demo mode.', 'error');
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    }
                }
            });

            function validateUsername(input) {
                const value = input.value.trim();
                if (value.length < 3) { input.classList.remove('is-valid'); input.classList.add('is-invalid'); return false; }
                else { input.classList.remove('is-invalid'); input.classList.add('is-valid'); return true; }
            }

            function validateEmail(input) {
                const value = input.value.trim();
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(value)) { input.classList.remove('is-valid'); input.classList.add('is-invalid'); return false; }
                else { input.classList.remove('is-invalid'); input.classList.add('is-valid'); return true; }
            }

            function validatePassword(input) {
                const value = input.value;
                if (value.length < 6) { input.classList.remove('is-valid'); input.classList.add('is-invalid'); return false; }
                else { input.classList.remove('is-invalid'); input.classList.add('is-valid'); return true; }
            }

            function validateConfirmPassword(input) {
                const value = input.value;
                const password = passwordInput.value;
                if (value !== password || value === '') { input.classList.remove('is-valid'); input.classList.add('is-invalid'); return false; }
                else { input.classList.remove('is-invalid'); input.classList.add('is-valid'); return true; }
            }

            function updatePasswordStrength(password) {
                passwordStrengthBar.className = 'password-strength-bar';
                if (password.length === 0) { passwordStrengthBar.style.width = '0'; }
                else if (password.length < 6) { passwordStrengthBar.classList.add('weak'); }
                else if (password.length < 10) { passwordStrengthBar.classList.add('medium'); }
                else { passwordStrengthBar.classList.add('strong'); }
            }

            function showAlert(message, type) {
                alertContainer.innerHTML = '<div class="alert-custom ' + type + '"><i class="fas fa-' + (type === 'success' ? 'check-circle' : 'exclamation-circle') + '"></i>' + message + '</div>';
                alertContainer.querySelector('.alert-custom').style.display = 'block';
            }
        });
    </script>
</body>

</html>
